name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy to Alwaysdata Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate version.json
        run: |
          GIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
          GIT_DATE=$(git log -1 --format="%cd" --date=format:"%Y-%m-%d" 2>/dev/null || date +%Y-%m-%d)
          SEM_VER=$(grep -oE 'app\.js\?v=[0-9.]+' index.html | head -1 | cut -d'=' -f2)
          echo "{\"hash\":\"${GIT_HASH}\",\"date\":\"${GIT_DATE}\",\"version\":\"v${SEM_VER}\"}" > version.json
          echo "📌 Versión generada: v${SEM_VER} (${GIT_HASH}) - ${GIT_DATE}"

      - name: Set up SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALWAYSDATA_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ssh-muchacholoco.alwaysdata.net >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -avz --exclude '.git' --exclude '.github' --exclude '.gemini' --exclude 'scratch' --exclude 'deploy.sh' --exclude 'firestore.rules' --exclude '*.md' --exclude '.claude' --exclude 'node_modules' --exclude '.DS_Store' ./ muchacholoco@ssh-muchacholoco.alwaysdata.net:/home/muchacholoco/www/asistencia/
